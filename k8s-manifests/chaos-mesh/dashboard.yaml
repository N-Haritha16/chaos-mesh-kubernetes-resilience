apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-dashboard
  namespace: chaos-mesh
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-dashboard
  namespace: chaos-mesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-dashboard
  template:
    metadata:
      labels:
        app: chaos-dashboard
    spec:
      serviceAccountName: chaos-dashboard
      containers:
        - name: dashboard
          image: ghcr.io/chaos-mesh/chaos-dashboard:v2.7.0
          args:
            - /chaos-dashboard
          ports:
            - name: http
              containerPort: 2333
---
apiVersion: v1
kind: Service
metadata:
  name: chaos-dashboard
  namespace: chaos-mesh
spec:
  selector:
    app: chaos-dashboard
  ports:
    - name: http
      port: 2333
      targetPort: 2333
      protocol: TCP

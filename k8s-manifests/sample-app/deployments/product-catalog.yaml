apiVersion: apps/v1
kind: Deployment
metadata:
  name: productcatalogservice
  namespace: sample-app
  labels:
    app: productcatalogservice
    app.kubernetes.io/part-of: online-boutique
spec:
  replicas: 2
  selector:
    matchLabels:
      app: productcatalogservice
      app.kubernetes.io/part-of: online-boutique
  template:
    metadata:
      labels:
        app: productcatalogservice
        app.kubernetes.io/part-of: online-boutique
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3550"
    spec:
      containers:
        - name: productcatalogservice
          image: gcr.io/google-samples/microservices-demo/productcatalogservice:v0.8.0
          ports:
            - containerPort: 3550
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 400m
              memory: 256Mi

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sample-app
  labels:
    app: frontend
    app.kubernetes.io/part-of: online-boutique
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
      app.kubernetes.io/part-of: online-boutique
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/part-of: online-boutique
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: frontend
          image: sample-frontend:local
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: sample-app
  labels:
    app: frontend
    app.kubernetes.io/part-of: online-boutique
spec:
  type: ClusterIP
  selector:
    app: frontend
    app.kubernetes.io/part-of: online-boutique
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: productcatalogservice
  namespace: sample-app
  labels:
    app: productcatalogservice
    app.kubernetes.io/part-of: online-boutique
spec:
  type: ClusterIP
  selector:
    app: productcatalogservice
    app.kubernetes.io/part-of: online-boutique
  ports:
    - port: 3550
      targetPort: 3550

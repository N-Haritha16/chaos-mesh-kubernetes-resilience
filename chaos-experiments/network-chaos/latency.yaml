apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: catalog-latency
  namespace: sample-app
spec:
  action: delay
  mode: one
  selector:
    namespaces:
      - sample-app
    labelSelectors:
      app: productcatalogservice
      app.kubernetes.io/part-of: online-boutique
  delay:
    latency: "200ms"
    correlation: "10"
    jitter: "50ms"
  direction: to
  target:
    mode: all
    selector:
      namespaces:
        - sample-app
      labelSelectors:
        app: frontend
        app.kubernetes.io/part-of: online-boutique
  duration: "60s"
